services:
  postgres:
    image: imresamu/postgis:18-3.6
    container_name: playvenue-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: playvenue
      POSTGRES_PASSWORD: playvenue_dev
      POSTGRES_DB: playvenue
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playvenue"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6
    container_name: playvenue-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
